<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Login Form</title>

<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:url("incredibly-beautiful-sunset-sun-lake-sunrise-landscape-panorama-nature-sky-amazing-colorful-clouds-fantasy-design-115177001.jpg") no-repeat;
    background-size:cover;
    background-position:center;
    padding:20px;
}

.wrapper{
    width:100%;
    max-width:420px;
    background:rgba(128,0,128,0.75);
    border:2px solid rgba(255,255,255,.2);
    backdrop-filter:blur(10px);
    color:#fff;
    border-radius:20px;
    padding:35px 30px;
    box-shadow:0 0 20px rgba(0,0,0,.25);
   background: transparent;
  
}

.wrapper h1{
    font-size:36px;
    text-align:center;
    margin-bottom:25px;
}

.input-box{
    position:relative;
    width:100%;
    height:50px;
    margin:20px 0;
}

.input-box input{
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    outline:none;
    border:2px solid rgba(255,255,255,.3);
    border-radius:40px;
    font-size:16px;
    color:#fff;
    padding:0 45px 0 20px;
}

.input-box input::placeholder{
    color:#fff;
}

.input-box i{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    font-size:20px;
}

.remember-forgot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin:-5px 0 20px;
    gap:10px;
    flex-wrap:wrap;
}

.remember-forgot label{
    display:flex;
    align-items:center;
    gap:5px;
}

.remember-forgot input{
    accent-color:#fff;
}

.remember-forgot a{
    color:#fff;
    text-decoration:none;
}

.remember-forgot a:hover{
    text-decoration:underline;
}

.btn{
    width:100%;
    height:45px;
    border:none;
    outline:none;
    border-radius:40px;
    background:#fff;
    color:#333;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.02);
}

.register-link{
    font-size:14px;
    text-align:center;
    margin-top:20px;
}

.register-link p a{
    color:#fff;
    font-weight:600;
    text-decoration:none;
}

.register-link p a:hover{
    text-decoration:underline;
}

/* Responsive HP */
@media(max-width:480px){
    .wrapper{
        padding:30px 20px;
    }

    .wrapper h1{
        font-size:30px;
    }

    .remember-forgot{
        font-size:13px;
        flex-direction:column;
        align-items:flex-start;
    }
}
</style>
</head>

<body>

<div class="wrapper">
    <form action="">
        <h1>Login</h1>

        <div class="input-box">
            <input type="text" placeholder="Username" required>
            <i class='bx bxs-user'></i>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
            <i class='bx bxs-lock-alt'></i>
        </div>

        <div class="remember-forgot">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="register-link">
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </form>
</div>

</body>
</html>
